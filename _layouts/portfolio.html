                        holdUntilRef.current = performance.now() + START_DELAY_MS;
                    }
                }, { threshold: [0, 0.85, 1] });
                obs.observe(node);
                return () => obs.disconnect();
            }, []);

            // Keep ref in sync with state so the rAF loop sees the latest value
            // without needing to be torn down and rebuilt each click.
            useEffect(() => { userPausedRef.current = userPaused; }, [userPaused]);

            const toggleAutoscroll = () => {
                const next = !userPausedRef.current;
                // Update ref synchronously so the rAF loop sees the new state
                // on the very next frame, not after React commits.
                userPausedRef.current = next;
                // Always clear any lingering hover/wheel hold - an explicit
                // button click overrides whatever timer was running.
                holdUntilRef.current = 0;
                // Also clear the transient hover-pause so a stray mouseenter
                // doesn't keep the loop blocked after resume.
                if (!next) pausedRef.current = false;
                setUserPaused(next);
            };

            useEffect(() => {
                const el = listRef.current;
                if (!el || !visible) return;

                const SPEED = 11;                  // px/sec, slow but visible drift
                const LOOP_DELAY_MS = 1500;        // pause after looping back to top
                const INTERRUPT_HOLD_MS = 5000;    // hold after any user interaction
                const ROLLBACK_MS = 1200;          // duration of smooth scroll back to top
                let last = performance.now();
                // Initial start-delay is handled by the IntersectionObserver
                // above (it sets holdUntilRef when the list first enters view).
                let pos = el.scrollTop;            // fractional accumulator; scrollTop may round
                let rollingBack = false;

                const step = (now) => {
                    const node = listRef.current;
                    if (!node) { autoRef.current = null; return; }
                    const dt = Math.min((now - last) / 1000, 0.05);
                    last = now;

                    const blocked =
                        pausedRef.current ||
                        userPausedRef.current ||
                        !inViewRef.current ||      // not actually at the News section
                        rollingBack ||
                        now < holdUntilRef.current;

                    if (!blocked) {
                        const maxScroll = node.scrollHeight - node.clientHeight;
                        if (maxScroll <= 0) {
                            autoRef.current = requestAnimationFrame(step);
                            return;
                        }
                        if (pos >= maxScroll - 0.5) {
                            // Smooth animated scroll back to top, then resume drifting
                            rollingBack = true;
                            node.scrollTo({ top: 0, behavior: 'smooth' });
                            setTimeout(() => {
                                rollingBack = false;
                                pos = 0;
                                last = performance.now();
                                holdUntilRef.current = performance.now() + LOOP_DELAY_MS;
                            }, ROLLBACK_MS);
                        } else {
                            pos += SPEED * dt;
                            node.scrollTop = pos;
                        }
                    } else if (!rollingBack) {
                        // Don't override scrollTop during smooth rollback;
                        // otherwise stay in sync with whatever the user did.
                        pos = node.scrollTop;
                    }
                    autoRef.current = requestAnimationFrame(step);
                };

                const onEnter = () => { pausedRef.current = true; };
                const onLeave = () => {
                    pausedRef.current = false;
                    last = performance.now();
                    holdUntilRef.current = performance.now() + INTERRUPT_HOLD_MS;
                };
                const onUserScroll = () => {
                    // Any wheel/touchmove input restarts the multi-second hold
                    holdUntilRef.current = performance.now() + INTERRUPT_HOLD_MS;
                };

                el.addEventListener('mouseenter', onEnter);
                el.addEventListener('mouseleave', onLeave);
                el.addEventListener('touchstart', onEnter, { passive: true });
                el.addEventListener('touchend', onLeave, { passive: true });
                el.addEventListener('wheel', onUserScroll, { passive: true });
                el.addEventListener('touchmove', onUserScroll, { passive: true });

                autoRef.current = requestAnimationFrame(step);
                return () => {
                    if (autoRef.current) cancelAnimationFrame(autoRef.current);
                    autoRef.current = null;
                    el.removeEventListener('mouseenter', onEnter);
                    el.removeEventListener('mouseleave', onLeave);
                    el.removeEventListener('touchstart', onEnter);
                    el.removeEventListener('touchend', onLeave);
                    el.removeEventListener('wheel', onUserScroll);
                    el.removeEventListener('touchmove', onUserScroll);
                };
            }, [visible, items.length]);

            return (
                <section id="news" ref={sectionRef} className={`section ${visible ? 'visible' : ''}`}>
                    <div className="news-section">
                        <div className="container">
                            <div className="news-header">
                                <h2 className="section-title" style={{ marginBottom: 0 }}>News &amp; Updates</h2>
                                <button
                                    type="button"
                                    className="news-autoscroll-toggle"
                                    onClick={toggleAutoscroll}
                                    aria-pressed={userPaused}
                                    aria-label={userPaused ? 'Resume autoscroll' : 'Pause autoscroll'}
                                    title={userPaused ? 'Resume autoscroll' : 'Pause autoscroll'}
                                >
                                    {userPaused ? (
                                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                    ) : (
                                        <svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
                                    )}
                                    <span>{userPaused ? 'Resume' : 'Pause'}</span>
                                </button>
                            </div>
                            <div className="news-list" ref={listRef}>
                                {items.map((item, i) => (
                                    <div key={i} className="news-item">
                                        <div className="news-date">{item.date}</div>
                                        <div
                                            className="news-description"
                                            dangerouslySetInnerHTML={{ __html: renderMarkdownLinks(item.description) }}
                                        />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // Types a "Hello, World!" greeting, replaces it with "I'm <Name>.",
        // then performs a Word-style gesture: caret nudges left, drag-selects
        // the name across to the start, applies an underline to the selected
        // range, deselects, and parks the caret at the end.
        const TypedName = ({ name }) => {
            const [text, setText] = useState('');
            const [caret, setCaret] = useState(0);
            const [selRange, setSelRange] = useState(null);
            const [ulRange, setUlRange] = useState(null);
            const subject = name || 'Rohit Lal';

            useEffect(() => {
                let cancelled = false;
                let buffer = '';
                let pos = 0;
                const sync = () => { setText(buffer); setCaret(pos); };
                const wait = (ms) => new Promise(res => window.setTimeout(res, ms));
                const rand = (lo, hi) => lo + Math.random() * (hi - lo);
                const delayFor = (ch) => {
                    if (ch === ',' || ch === '!') return rand(420, 620);
                    if (ch === ' ')               return rand(90, 180);
                    if (ch === "'" || ch === '"') return rand(140, 240);
                    return rand(110, 230);
                };
                const typeStr = async (str, fixedSpeed) => {
                    for (const ch of str) {
                        if (cancelled) return;
                        buffer = buffer.slice(0, pos) + ch + buffer.slice(pos);
                        pos += 1;
                        sync();
                        await wait(fixedSpeed != null ? fixedSpeed : delayFor(ch));
                    }
                };
                const backspace = async (n) => {
                    for (let i = 0; i < n; i++) {
                        if (cancelled || pos === 0) return;
                        buffer = buffer.slice(0, pos - 1) + buffer.slice(pos);
                        pos -= 1;
                        sync();
                        await wait(rand(60, 110));
                    }
                };
                const moveLeft = async (n) => {
                    for (let i = 0; i < n; i++) {
                        if (cancelled || pos === 0) return;
                        pos -= 1;
                        sync();
                        await wait(rand(100, 160));
                    }
                };
                const moveToEnd = async () => {
                    if (cancelled) return;
                    await wait(rand(180, 260));
                    pos = buffer.length;
                    sync();
                };
                // Word-style drag-select: anchor at the current caret, head
                // sweeps left one character at a time leaving a highlight.
                const dragSelectLeft = async (n) => {
                    const anchor = pos;
                    for (let i = 0; i < n; i++) {
                        if (cancelled || pos === 0) return;
                        pos -= 1;
                        setSelRange([pos, anchor]);
                        sync();
                        await wait(rand(38, 65));
                    }
                };
                const applyUnderlineToSelection = (range) => { setUlRange(range); };
                const clearSelection = () => { setSelRange(null); };

                (async () => {
                    await wait(600);              // brief beat before typing starts
                    await typeStr('Hello, World!', 55);  // fast: ~55ms per char, classic dev greeting
                    if (cancelled) return;
                    await wait(1500);             // let the greeting sit visible
                    await backspace('Hello, World!'.length);
                    await wait(320);              // pause - "let me actually introduce myself"
                    await typeStr(`I'm ${subject}.`);    // normal cadence, full name with full stop

                    if (cancelled) return;
                    // "Rohit Lal" range inside "I'm Rohit Lal." starts after
                    // the "I'm " prefix and ends right before the period.
                    const prefix = `I'm `;
                    const nameStart = prefix.length;
                    const nameEnd = nameStart + subject.length;

                    await wait(650);              // admire the line for a beat
                    await moveLeft(1);            // caret nudges off the period, lands after l
                    await wait(380);
                    await dragSelectLeft(subject.length);  // drag-select "Rohit Lal" right-to-left
                    await wait(550);              // selection sits visible
                    applyUnderlineToSelection([nameStart, nameEnd]);  // Cmd+U lands
                    await wait(900);              // admire the underlined name
                    clearSelection();             // click-away, deselect
                    await wait(220);
                    await moveToEnd();            // caret back to the end of "Lal."
                    await typeStr(' ');           // trailing whitespace so the caret rests away
                })();

                return () => { cancelled = true; };
            }, [subject]);

            // Render the text as 1-3 segments based on the active selection
            // and underline ranges, with the caret slotted in at its position.
            const splitPoints = (() => {
                const set = new Set([0, text.length, caret]);
                if (selRange) { set.add(selRange[0]); set.add(selRange[1]); }
                if (ulRange)  { set.add(ulRange[0]);  set.add(ulRange[1]); }
                return [...set].filter(p => p >= 0 && p <= text.length).sort((a, b) => a - b);
            })();
            const nodes = [];
            for (let s = 0; s < splitPoints.length; s++) {
                const start = splitPoints[s];
                if (start === caret) {
                    nodes.push(<span key={`c${s}`} className="hero-cursor" aria-hidden="true" />);
                }
                if (s === splitPoints.length - 1) break;
                const end = splitPoints[s + 1];
                if (start === end) continue;
                const inSel = selRange && start >= selRange[0] && end <= selRange[1];
                const inUL  = ulRange  && start >= ulRange[0]  && end <= ulRange[1];
                const cls = [
                    inSel ? 'hero-name-sel' : '',
                    inUL  ? 'hero-name-ul'  : '',
                ].filter(Boolean).join(' ');
                nodes.push(
                    <span key={`s${start}`} className={cls}>{text.slice(start, end)}</span>
                );
            }
            return <React.Fragment>{nodes}</React.Fragment>;
        };

        // ---- Hero ----
        const Hero = () => {
            const dp = aboutme.DP_Link || 'img/rohit.png';
            const expertiseParts = (aboutme.Area_Of_Expertise || '').split('|').map(p => p.trim()).filter(Boolean);
            const emailHref = aboutme.Email || 'mailto:take2rohit@gmail.com';

            // Corner decoration: scripted sequence of squares. Each "square event"
            // is 4 line segments (top, right, bottom, left) sharing one animation
            // delay so all four sides draw together, hold, and wipe together -
            // guaranteed to outline a real square instead of stray lines.
            const gridLines = React.useMemo(() => {
                const CYCLE = 16;        // master loop in seconds
                const squares = [
                    { x: 55,  y: 30,  side: 75, t: 0  },
                    { x: 170, y: 80,  side: 55, t: 4  },
                    { x: 45,  y: 155, side: 70, t: 8  },
                    { x: 160, y: 190, side: 50, t: 12 },
                ];
                const out = [];
                squares.forEach((sq, idx) => {
                    const { x, y, side, t } = sq;
                    // ordered so the draw flows around the perimeter: top L->R,
                    // right T->B, bottom R->L, left B->T
                    const sides = [
                        { x1: x,        y1: y,        x2: x + side, y2: y        },
                        { x1: x + side, y1: y,        x2: x + side, y2: y + side },
                        { x1: x + side, y1: y + side, x2: x,        y2: y + side },
                        { x1: x,        y1: y + side, x2: x,        y2: y        },
                    ];
                    sides.forEach((s, j) => {
                        // Small per-side stagger so the square draws around itself
                        const delay = t + j * 0.25;
                        out.push(
                            <line
                                key={`${idx}-${j}`}
                                className="hero-grid-line"
                                pathLength="100"
                                x1={s.x1} y1={s.y1} x2={s.x2} y2={s.y2}
                                style={{
                                    animationDelay: `${delay}s`,
                                    animationDuration: `${CYCLE}s`,
                                }}
                            />
                        );
                    });
                });
                return out;
            }, []);

            return (
                <section id="hero" className="hero section visible">
                    <svg
                        className="hero-grid"
                        viewBox="0 0 260 260"
                        preserveAspectRatio="none"
                        aria-hidden="true"
                    >
                        {gridLines}
                    </svg>
                    <div className="container">
                        <div className="hero-wrapper">
                            <div className="hero-image-wrapper">
                                <img src={dp} alt={aboutme.Name || 'Profile'} className="hero-image" />
                            </div>
                            <div className="hero-content">
                                <h1 className="hero-name"><TypedName name={aboutme.Name} /></h1>
                                <p className="hero-expertise">
                                    {expertiseParts.map((p, i) => (
                                        <React.Fragment key={i}>
                                            <span className="hero-accent">{p}</span>
                                            {i < expertiseParts.length - 1 && <span style={{ color: 'var(--text-tertiary)' }}> | </span>}
                                        </React.Fragment>
                                    ))}
                                </p>
                                <p className="hero-bio" dangerouslySetInnerHTML={{ __html: renderMarkdownLinks(aboutme.Bio_Short || aboutme.About || '') }} />
                                <div className="hero-links">
                                    <a href={emailHref} className="hero-link primary">
                                        <Icon name="email" /><span>Email</span>
                                    </a>
                                    {aboutme.Github && (
                                        <a href={aboutme.Github} target="_blank" rel="noopener noreferrer" className="hero-link">
                                            <Icon name="github" /><span>GitHub</span>
                                        </a>
                                    )}
                                    {aboutme.LinkedIn && (
                                        <a href={aboutme.LinkedIn} target="_blank" rel="noopener noreferrer" className="hero-link">
                                            <Icon name="linkedin" /><span>LinkedIn</span>
                                        </a>
                                    )}
                                    {aboutme.Scholar && (
                                        <a href={aboutme.Scholar} target="_blank" rel="noopener noreferrer" className="hero-link">
                                            <Icon name="scholar" /><span>Scholar</span>
                                        </a>
                                    )}
                                    {aboutme.Twitter && (
                                        <a href={aboutme.Twitter} target="_blank" rel="noopener noreferrer" className="hero-link">
                                            <Icon name="twitter" /><span>X / Twitter</span>
                                        </a>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ---- Stats ----
        const STAT_COUNT_DURATION = 9000; // ms — shared so all counters finish together

        const StatCounter = ({ target, suffix, label, animate }) => {
            const [value, setValue] = useState(0);
            useEffect(() => {
                if (!animate) return;
                const start = performance.now();
                let frame;
                const tick = (now) => {
                    const t = Math.min((now - start) / STAT_COUNT_DURATION, 1);
                    const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
                    setValue(Math.round(target * eased));
                    if (t < 1) frame = requestAnimationFrame(tick);
                };
                frame = requestAnimationFrame(tick);
                return () => cancelAnimationFrame(frame);
            }, [animate, target]);
            // Reserve width based on the final string so the card doesn't reflow each tick.
            const finalText = `${target}${suffix || ''}`;
            return (
                <div className="stat-card">
                    <div className="stat-number stat-number--counter">
                        <span className="stat-number-ghost" aria-hidden="true">{finalText}</span>
                        <span className="stat-number-value">{value}{suffix}</span>
                    </div>
                    <div className="stat-label">{label}</div>
                </div>
            );
        };

        const StatMarquee = ({ text, label }) => {
            const items = String(text).split(',').map(s => s.trim()).filter(Boolean);
            const doubled = [...items, ...items];
            return (
                <div className="stat-card stat-card--marquee">
                    <div className="stat-marquee">
                        <div className="stat-marquee-track">
                            {doubled.map((v, i) => (
                                <span key={i} className="stat-marquee-item">{v}</span>
                            ))}

                    <div className="stat-label">{label}</div>
                </div>

        };

        const Stats = () => {
            const [ref, visible] = useInView(0.3);
            const stats = Array.isArray(aboutme.Stats) ? aboutme.Stats : [];
            if (!stats.length) return null;
            return (
                <div ref={ref} className="stats">
                    {stats.map((s, i) => {
                        const raw = String(s.number);
                        if (raw.includes(',')) {
                            return <StatMarquee key={i} text={raw} label={s.label} />;
                        }
                        const m = raw.match(/^(-?\d+(?:\.\d+)?)(\D*)$/);
                        if (m) {
                            return (
                                <StatCounter
                                    key={i}
                                    target={parseFloat(m[1])}
                                    suffix={m[2]}
                                    label={s.label}
                                    animate={visible}
                                />
                            );
                        }
                        return (
                            <div key={i} className="stat-card">
                                <div className="stat-number">{s.number}</div>

        };

        // ---- Publications ----
        const fallbackPubImage = 'img/portfolio/word_emb.webp';

        const Publications = () => {
            const [ref, visible] = useInView();
            return (
                <section id="publications" ref={ref} className={`section ${visible ? 'visible' : ''}`}>

                        {publicationsData.map((pub, i) => (

                                            {pub.project_page && <a href={pub.project_page} target="_blank" rel="noopener noreferrer" className="publication-link">Project</a>}
                                            {pub.bibtex && <a href={pub.bibtex} target="_blank" rel="noopener noreferrer" className="publication-link">BibTeX</a>}
                                            {pub.video && <a href={pub.video} target="_blank" rel="noopener noreferrer" className="publication-link">Video</a>}
                                        </div>

                                    <p className="publication-authors" dangerouslySetInnerHTML={{ __html: renderMarkdownLinks(pub.author) }} />
                                    <p className="publication-venue">{pub.pub}</p>

                                </div>
                            </div>

        // ---- Experience ----
        const Experience = () => {
            const [ref, visible] = useInView();
            const itemRefs = useRef([]);
            const [visibleItems, setVisibleItems] = useState(new Set());

            useEffect(() => {
                const obs = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const idx = itemRefs.current.indexOf(entry.target);
                            if (idx >= 0) setVisibleItems(prev => new Set(prev).add(idx));
                        }
                    });
                }, { threshold: 0.2 });
                itemRefs.current.forEach(el => el && obs.observe(el));
                return () => obs.disconnect();
            }, []);

            return (
                <section id="experience" ref={ref} className={`section ${visible ? 'visible' : ''}`}>
                    <div className="container">
                        <h2 className="section-title">Experience</h2>
                        <div className="timeline">
                            {experienceData.map((exp, i) => (
                                <div
                                    key={i}
                                    ref={el => itemRefs.current[i] = el}
                                    className={`timeline-item ${visibleItems.has(i) ? 'visible' : ''}`}
                                >
                                    <div>

                                    </div>

                                        {exp.location && <div className="timeline-location">{exp.location}</div>}
                                        <div className="timeline-dates">{exp.date}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

        };

        // ---- Projects ----
        const Projects = () => {
            const [ref, visible] = useInView();
            const [filter, setFilter] = useState('All');
            const scrollRef = useRef(null);
            const autoRef = useRef(null);

            const allTags = ['All', ...Array.from(new Set(projectsData.flatMap(p => p.tags || [])))];
            const filtered = filter === 'All' ? projectsData : projectsData.filter(p => (p.tags || []).includes(filter));

            const scrollBy = (dir) => {
                if (scrollRef.current) {
                    scrollRef.current.scrollBy({ left: dir * 340, behavior: 'smooth' });
                }
            };

            const stopAuto = () => {
                if (autoRef.current) { cancelAnimationFrame(autoRef.current); autoRef.current = null; }
            };

            const startAuto = () => {
                stopAuto();
                const SPEED = 35; // px/sec, marquee drift speed
                let last = performance.now();
                let rollingBack = false;

                const step = (now) => {
                    const el = scrollRef.current;
                    if (!el) { autoRef.current = null; return; }
                    const dt = Math.min((now - last) / 1000, 0.05); // clamp on tab refocus
                    last = now;

                    if (!rollingBack) {
                        const maxScroll = el.scrollWidth - el.clientWidth;
                        if (el.scrollLeft >= maxScroll - 1) {
                            // Smooth animated rollback to start, then resume drifting
                            rollingBack = true;
                            el.scrollTo({ left: 0, behavior: 'smooth' });
                            setTimeout(() => { rollingBack = false; last = performance.now(); }, 1200);
                        } else {
                            el.scrollLeft += SPEED * dt;
                        }
                    }
                    autoRef.current = requestAnimationFrame(step);
                };
                autoRef.current = requestAnimationFrame(step);
            };

            // Auto-scroll when section is in view; pause when out of view
            useEffect(() => {
                if (visible) startAuto(); else stopAuto();
                return stopAuto;
            }, [visible, filter]);

            return (
                <section id="projects" ref={ref} className={`section ${visible ? 'visible' : ''}`}>
                    <div className="container">
                        <h2 className="section-title">Projects</h2>
                        <p className="projects-caption">
                            <em>B.C. - Before Claude.</em> Undergrad projects where I built AI, not the other way around.
                        </p>
                        {allTags.length > 1 && (
                            <div className="project-filters">
                                {allTags.map(tag => (
                                    <button
                                        key={tag}
                                        className={`filter-btn ${filter === tag ? 'active' : ''}`}
                                        onClick={() => setFilter(tag)}
                                    >{tag}</button>
                                ))}
                            </div>
                        )}
                        <div style={{ position: 'relative' }} onMouseEnter={stopAuto} onMouseLeave={startAuto}>
                            <button
                                onClick={() => { stopAuto(); scrollBy(-1); }}
                                aria-label="Scroll left"
                                style={{ position: 'absolute', left: '-20px', top: '50%', transform: 'translateY(-50%)', zIndex: 10, width: 40, height: 40, borderRadius: '50%', background: 'var(--bg-secondary)', border: '2px solid var(--accent)', color: 'var(--accent)', fontSize: 20, cursor: 'pointer', boxShadow: '0 4px 12px var(--shadow)' }}
                            >←</button>
                            <button
                                onClick={() => { stopAuto(); scrollBy(1); }}
                                aria-label="Scroll right"
                                style={{ position: 'absolute', right: '-20px', top: '50%', transform: 'translateY(-50%)', zIndex: 10, width: 40, height: 40, borderRadius: '50%', background: 'var(--bg-secondary)', border: '2px solid var(--accent)', color: 'var(--accent)', fontSize: 20, cursor: 'pointer', boxShadow: '0 4px 12px var(--shadow)' }}
                            >→</button>
                            <div ref={scrollRef} className="projects-grid">
                                {filtered.map((project, i) => (
                                    <div key={i} className="project-card">
                                        <div className="project-image-wrapper">
                                            <img src={project.image} alt={project.title} className="project-image" loading="lazy" />
                                        </div>
                                        <div className="project-content">
                                            <h3 className="project-title">{project.title}</h3>
                                            <p className="project-abstract">{project.abstract}</p>
                                            {project.tags && project.tags.length > 0 && (
                                                <div className="project-tags">
                                                    {project.tags.map((tag, j) => (
                                                        <span key={j} className="project-tag">{tag}</span>
                                                    ))}
                                                </div>
                                            )}
                                            <div className="project-links">
                                                {project.github && <a href={project.github} target="_blank" rel="noopener noreferrer" className="project-link">GitHub</a>}
                                                {project.video && <a href={project.video} target="_blank" rel="noopener noreferrer" className="project-link">Video</a>}
                                                {project.paper && <a href={project.paper} target="_blank" rel="noopener noreferrer" className="project-link">Paper</a>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ---- Skills ----
        const Skills = () => {
            const [ref, visible] = useInView();
            const cats = skillsData.categories || [];
            return (
                <section id="skills" ref={ref} className={`section ${visible ? 'visible' : ''}`}>
                    <div className="container">
                        <h2 className="section-title">Technical Skills</h2>
                        <div className="skills-categories">
                            {cats.map((cat, i) => {
                                const color = cat.color || 'var(--accent)';
                                return (
                                    <div
                                        key={i}
                                        className="skill-category"
                                        style={{ animationDelay: `${i * 0.1}s` }}
                                    >
                                        <h3 className="skill-category-title" style={{ borderLeft: `4px solid ${color}`, paddingLeft: '0.6rem' }}>{cat.title}</h3>
                                        <div className="skill-pills">
                                            {(cat.skills || []).map((skill, j) => (
                                                <span
                                                    key={j}
                                                    className="skill-pill"
                                                    style={{ borderColor: color }}
                                                    onMouseEnter={(e) => { e.currentTarget.style.background = color; e.currentTarget.style.color = 'white'; }}
                                                    onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-primary)'; }}
                                                >{skill}</span>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </section>
            );
        };

        // ---- Awards Carousel ----
        const Gallery = () => {
            const [ref, visible] = useInView();
            const [currentIndex, setCurrentIndex] = useState(0);
            const [auto, setAuto] = useState(true);
            const items = achievementsData;

            const getPerView = () => {
                if (typeof window === 'undefined') return 3;
                if (window.innerWidth > 1024) return 3;
                if (window.innerWidth > 768) return 2;
                return 1;
            };

            const [perView, setPerView] = useState(getPerView());
            useEffect(() => {
                const onResize = () => setPerView(getPerView());
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            const maxIndex = Math.max(0, items.length - perView);

            useEffect(() => {
                if (!auto || maxIndex === 0) return;
                const t = setInterval(() => {
                    setCurrentIndex(prev => prev >= maxIndex ? 0 : prev + 1);
                }, 4000);
                return () => clearInterval(t);
            }, [auto, maxIndex]);

            const handlePrev = () => { setAuto(false); setCurrentIndex(p => Math.max(0, p - 1)); };
            const handleNext = () => { setAuto(false); setCurrentIndex(p => Math.min(maxIndex, p + 1)); };

            return (
                <section id="gallery" ref={ref} className={`section ${visible ? 'visible' : ''}`}>
                    <div className="container">
                        <h2 className="section-title">Recognition</h2>
                        <div
                            className="gallery-carousel-container"
                            onMouseEnter={() => setAuto(false)}
                            onMouseLeave={() => setAuto(true)}
                        >
                            {currentIndex > 0 && (
                                <button className="carousel-nav prev" onClick={handlePrev} aria-label="Previous">
                                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                                </button>
                            )}
                            <div
                                className="gallery-carousel"
                                style={{ transform: `translateX(calc(-${currentIndex * (100 / perView)}% - ${currentIndex * 16}px))` }}
                            >
                                {items.map((item, i) => {
                                    const inner = (
                                        <React.Fragment>
                                            <div className="carousel-image-container">
                                                <img src={item.image} alt={item.title} className="carousel-image" loading="lazy" />
                                            </div>
                                            <div className="carousel-overlay">
                                                <h3 className="carousel-title">{item.title}</h3>
                                                <p className="carousel-description">{item.description}</p>
                                                <div className="carousel-date"><span>{item.date}</span></div>
                                                {item.link && <div className="carousel-link-cue">View source ↗</div>}
                                            </div>
                                        </React.Fragment>
                                    );
                                    return item.link ? (
                                        <a key={i}
                                           href={item.link}
                                           target="_blank"
                                           rel="noopener noreferrer"
                                           className="carousel-item carousel-item-link"
                                           aria-label={`${item.title} - view source`}>
                                            {inner}
                                        </a>
                                    ) : (
                                        <div key={i} className="carousel-item">{inner}</div>
                                    );
                                })}
                            </div>
                            {currentIndex < maxIndex && (
                                <button className="carousel-nav next" onClick={handleNext} aria-label="Next">
                                    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                                </button>
                            )}
                        </div>
                        {maxIndex > 0 && (
                            <div className="carousel-indicators">
                                {Array.from({ length: maxIndex + 1 }).map((_, i) => (
                                    <div
                                        key={i}
                                        className={`carousel-indicator ${i === currentIndex ? 'active' : ''}`}
                                        onClick={() => { setAuto(false); setCurrentIndex(i); }}
                                    />
                                ))}
                            </div>
                        )}
                    </div>
                </section>
            );
        };

        // ---- Travel Map (D3 + topojson) ----
        const projectLatLng = (lat, lng) => {
            const projection = d3.geoAlbersUsa().scale(1280).translate([480, 300]);
            const c = projection([lng, lat]);
            return c ? { x: c[0], y: c[1] } : null;
        };

        const TravelMap = () => {
            const [ref, visible] = useInView();
            const [mapData, setMapData] = useState(null);
            const [pathFn, setPathFn] = useState(null);
            const [hover, setHover] = useState(null);
            const containerRef = useRef(null);

            useEffect(() => {
                if (typeof fetch !== 'function' || typeof d3 === 'undefined' || typeof topojson === 'undefined') {
                    return;
                }
                fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
                    .then(r => r.json())
                    .then(data => {
                        setMapData(data);
                        const projection = d3.geoAlbersUsa().scale(1280).translate([480, 300]);
                        const path = d3.geoPath().projection(projection);
                        setPathFn(() => path);
                    })
                    .catch(err => console.error('Failed to load map', err));
            }, []);

            const cities = travelData.cities || [];

            // Tooltip is centred in the map container by CSS, so the marker
            // enter handler only needs to know which city to show.
            const handleMarkerEnter = (city) => setHover(city);

            return (
                <section id="travel" ref={ref} className={`section ${visible ? 'visible' : ''}`}>
                    <div className="container">
                        <h2 className="section-title">Travel Chronicles</h2>
                        <p style={{ fontSize: '1rem', color: 'var(--text-secondary)', marginBottom: 'var(--space-lg)', maxWidth: 820, textWrap: 'balance' }}>
                            Beyond the research lab, I love exploring new cities and capturing moments along the way.{' '}
                            <strong style={{ color: 'var(--accent)' }}>Hover over the map</strong> to see snapshots from my travels.
                        </p>
                        <div className="journey-map-container" ref={containerRef}>
                            {(!mapData || !pathFn) ? (
                                <div style={{ textAlign: 'center', padding: 100, color: 'var(--text-secondary)' }}>Loading map…</div>
                            ) : (
                                <svg viewBox="0 0 960 600" style={{ width: '100%', height: '100%' }}>
                                    <g>
                                        {topojson.feature(mapData, mapData.objects.states).features.map((state, i) => (
                                            <path
                                                key={i}
                                                d={pathFn(state)}
                                                fill="var(--bg-tertiary)"
                                                stroke="var(--border-color)"
                                                strokeWidth="1.5"
                                            />
                                        ))}
                                    </g>
                                    {cities.map((c, i) => {
                                        const proj = projectLatLng(c.lat, c.lng);
                                        if (!proj) return null;
                                        const { x, y } = proj;
                                        const isPark = c.type === 'park';
                                        const onEnter = () => handleMarkerEnter(c);
                                        const onLeave = () => setHover(null);
                                        // Home city (where Rohit lives) gets a red marker + label.
                                        const markerColor = c.home ? '#d62828' : 'var(--accent)';
                                        const labelColor = c.home ? '#d62828' : 'var(--text-primary)';
                                        const labelWeight = c.home ? '700' : '500';

                                        if (isPark) {
                                            return (
                                                <g key={i} style={{ cursor: 'pointer' }} onMouseEnter={onEnter} onMouseLeave={onLeave}>
                                                    <circle cx={x} cy={y} r="14" fill={markerColor} opacity="0.06" />
                                                    <g transform={`translate(${x}, ${y})`}>
                                                        <path d="M 0,-9 L 7,6 L -7,6 Z" fill="none" stroke={markerColor} strokeWidth="2" opacity="0.6" />
                                                        <path d="M 0,-6 L 4,4 L -4,4 Z" fill={markerColor} />
                                                        <circle cy="-4" r="1.5" fill="var(--bg-secondary)" />
                                                    </g>
                                                </g>
                                            );
                                        }

                                        return (
                                            <g key={i} style={{ cursor: 'pointer' }} onMouseEnter={onEnter} onMouseLeave={onLeave}>
                                                <circle cx={x} cy={y} r="16" fill={markerColor} opacity="0.08" />
                                                {c.home && <circle className="home-pulse" cx={x} cy={y} r="5" />}
                                                <g transform={`translate(${x}, ${y})`}>
                                                    <circle r="10" fill="none" stroke={markerColor} strokeWidth="1.5" opacity="0.3" />
                                                    <circle r="7" fill="none" stroke={markerColor} strokeWidth="2" opacity="0.6" />
                                                    <circle r="4" fill={markerColor} />
                                                    <circle r="1.5" fill="var(--bg-secondary)" />
                                                </g>
                                                <text
                                                    x={x + (c.offsetX || 0)}
                                                    y={y + (c.offsetY || 25)}
                                                    textAnchor={c.textAnchor || 'middle'}
                                                    fill={labelColor}
                                                    fontSize="13"
                                                    fontWeight={labelWeight}
                                                    style={{ pointerEvents: 'none', userSelect: 'none' }}
                                                >{c.name}</text>
                                            </g>
                                        );
                                    })}
                                    {/* Legend tucked into the empty Atlantic east of Florida */}
                                    <g transform="translate(825, 430)" style={{ pointerEvents: 'none' }}>
                                        <rect
                                            x="0" y="0" width="130" height="130"
                                            rx="6"
                                            fill="var(--bg-secondary)"
                                            stroke="var(--border-color)"
                                            strokeWidth="1"
                                            opacity="0.92"
                                        />
                                        <text x="12" y="20" fontSize="11" fontWeight="700" letterSpacing="1.2" fill="var(--text-secondary)">
                                            LEGEND
                                        </text>

                                        {/* City marker */}
                                        <g transform="translate(22, 50)">
                                            <circle r="7" fill="none" stroke="var(--accent)" strokeWidth="1.5" opacity="0.3" />
                                            <circle r="5" fill="none" stroke="var(--accent)" strokeWidth="1.5" opacity="0.6" />
                                            <circle r="2.5" fill="var(--accent)" />
                                        </g>
                                        <text x="38" y="54" fontSize="13" fontWeight="500" fill="var(--text-primary)">City</text>

                                        {/* National Park marker */}
                                        <g transform="translate(22, 80)">
                                            <path d="M 0,-7 L 6,5 L -6,5 Z" fill="none" stroke="var(--accent)" strokeWidth="1.5" opacity="0.6" />
                                            <path d="M 0,-4 L 3,3 L -3,3 Z" fill="var(--accent)" />
                                        </g>
                                        <text x="38" y="84" fontSize="13" fontWeight="500" fill="var(--text-primary)">National park</text>

                                        {/* Home marker */}
                                        <g transform="translate(22, 110)">
                                            <circle r="7" fill="none" stroke="#d62828" strokeWidth="1.5" opacity="0.3" />
                                            <circle r="5" fill="none" stroke="#d62828" strokeWidth="1.5" opacity="0.6" />
                                            <circle r="2.5" fill="#d62828" />
                                        </g>
                                        <text x="38" y="114" fontSize="13" fontWeight="700" fill="#d62828">Home</text>
                                    </g>
                                </svg>
                            )}
                            {hover && (
                                <div className="map-tooltip">
                                    {hover.image && <img src={hover.image} alt={hover.name} loading="lazy" />}
                                    <div className="map-tooltip-body">
                                        <div className="map-tooltip-name">{hover.name}</div>
                                        <div className="map-tooltip-desc">{hover.description}</div>
                                        {hover.image_credit && (
                                            <div className="map-tooltip-credit">
                                                Photo: {hover.image_credit_url ? (
                                                    <a href={hover.image_credit_url} target="_blank" rel="noopener noreferrer">{hover.image_credit}</a>
                                                ) : hover.image_credit}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </section>
            );
        };

        // ---- Contact ----
        const Contact = () => {
            const [ref, visible] = useInView();
            const [form, setForm] = useState({ name: '', email: '', message: '' });
            const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

            const handleSubmit = (e) => {
                e.preventDefault();
                const to = (aboutme.Email || 'mailto:take2rohit@gmail.com').replace(/^mailto:/, '');
                const subject = encodeURIComponent(`Portfolio Contact from ${form.name || 'someone'}`);
                const body = encodeURIComponent(`${form.message}\n\nFrom: ${form.email}`);
                window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
            };

            return (
                <section id="contact" ref={ref} className={`section ${visible ? 'visible' : ''}`}>
                    <div className="container">
                        <h2 className="section-title">Get In Touch</h2>
                        <form className="contact-form" onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label className="form-label" htmlFor="name">Name</label>
                                <input id="name" name="name" type="text" className="form-input" value={form.name} onChange={handleChange} required />
                            </div>
                            <div className="form-group">
                                <label className="form-label" htmlFor="email">Email</label>
                                <input id="email" name="email" type="email" className="form-input" value={form.email} onChange={handleChange} required />
                            </div>
                            <div className="form-group">
                                <label className="form-label" htmlFor="message">Message</label>
                                <textarea id="message" name="message" className="form-textarea" value={form.message} onChange={handleChange} required />
                            </div>
                            <button type="submit" className="form-submit">Send Message</button>
                        </form>
                    </div>
                </section>
            );
        };

        // ---- App ----
        const App = () => {
            const [active, setActive] = useState('hero');
            const [resetKey, setResetKey] = useState(0);

            useEffect(() => {
                const sectionIds = ['hero', 'news', 'publications', 'experience', 'projects', 'skills', 'gallery', 'travel', 'contact'];
                const onScroll = () => {
                    const y = window.scrollY + 200;
                    for (const id of sectionIds) {
                        const el = document.getElementById(id);
                        if (el) {
                            const top = el.offsetTop;
                            const bottom = top + el.offsetHeight;
                            if (y >= top && y < bottom) { setActive(id); break; }
                        }
                    }
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                onScroll();
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            const scrollToSection = (id) => {
                const el = document.getElementById(id);
                if (!el) return;
                const top = id === 'hero' ? 0 : el.offsetTop - 60;
                window.scrollTo({ top, behavior: 'smooth' });
            };

            return (
                <>
                    <Navigation active={active} onNavigate={scrollToSection} onReset={() => setResetKey(k => k + 1)} />
                    <div style={{ paddingTop: 60 }}>
                        <Hero key={resetKey} />
                        <NewsSection key={resetKey} />
                        <Publications key={resetKey} />
                        <Experience key={resetKey} />
                        <Projects key={resetKey} />
                        <Skills key={resetKey} />
                        <Gallery key={resetKey} />
                        <TravelMap key={resetKey} />
                        <Contact key={resetKey} />
                        <footer className="footer">
                            <div className="container">
                                <p>
                                    © {new Date().getFullYear()} {aboutme.Name || 'Rohit Lal'}. All rights reserved.
                                    {aboutme.Github   && <> · <a href={aboutme.Github} target="_blank" rel="noopener noreferrer">GitHub</a></>}
                                    {aboutme.LinkedIn && <> · <a href={aboutme.LinkedIn} target="_blank" rel="noopener noreferrer">LinkedIn</a></>}
                                    {aboutme.Scholar  && <> · <a href={aboutme.Scholar} target="_blank" rel="noopener noreferrer">Scholar</a></>}
                                </p>
                            </div>
                        </footer>
                    </div>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    {% endraw %}
</body>
</html>
