<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Set the js flag before the body is parsed so the crawler fallback is
         hidden from real users without a flash. Crawlers/extractors that do not
         run JS leave the flag unset and read the fallback content normally. -->
    <script>document.documentElement.className += ' js';</script>
    <style>
        #static-content { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.25rem; }
        html.js #static-content { display: none; }
    </style>
    <title>{{ site.data.aboutme.Name }} | AI Researcher</title>
    <meta name="description" content="{{ site.description | strip_newlines | strip }}">
    <meta name="author" content="{{ site.data.aboutme.Name }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <meta name="theme-color" content="#1e3a5f">

    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <meta name="keywords" content="{{ site.data.aboutme.Name }}, {{ site.data.aboutme.Area_Of_Expertise | replace: '|', ',' | strip }}, AI researcher, foundation models, machine learning, NASA">

    <link rel="sitemap" type="application/xml" href="{{ '/sitemap.xml' | absolute_url }}">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ site.data.aboutme.Name }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{{ site.data.aboutme.Name }} | AI Researcher">
    <meta property="og:description" content="{{ site.description | strip_newlines | strip }}">
    <meta property="og:image" content="{{ '/img/meta_img.jpg' | absolute_url }}">
    <meta property="og:image:width" content="2400">
    <meta property="og:image:height" content="1260">
    <meta property="og:image:alt" content="{{ site.data.aboutme.Name }}, AI Researcher - Computer Vision, Generative AI, NLP - rohitlal.com">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@take2rohit">
    <meta name="twitter:creator" content="@take2rohit">
    <meta name="twitter:title" content="{{ site.data.aboutme.Name }} | AI Researcher">
    <meta name="twitter:description" content="{{ site.description | strip_newlines | strip }}">
    <meta name="twitter:image" content="{{ '/img/meta_img.jpg' | absolute_url }}">

    <link rel="icon" type="image/x-icon" href="{{ '/img/favicon.ico' | relative_url }}">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ '/img/icon-192.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="512x512" href="{{ '/img/icon-512.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/img/apple-touch-icon.png' | relative_url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font-display: 'Libre Baskerville', 'Georgia', serif;
            --font-body: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

            --space-xs: 0.375rem;
            --space-sm: 0.75rem;
            --space-md: 1.25rem;
            --space-lg: 2rem;
            --space-xl: 3rem;

            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;

            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);

            --bg-primary: #faf8f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f5f1eb;
            --bg-hover: #f9f6f1;
            --text-primary: #1a1512;
            --text-secondary: #5a524c;
            --text-tertiary: #8a7f76;
            --border-color: #e8dfd5;
            --accent: #1e3a5f;
            --accent-hover: #15294a;
            --accent-light: rgba(30, 58, 95, 0.08);
            --shadow: rgba(0, 0, 0, 0.04);
            --shadow-md: rgba(0, 0, 0, 0.08);
        }

        html { scroll-behavior: smooth; }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            font-size: 1.125rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(250, 248, 245, 0.95);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            transition: all var(--transition-base);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem var(--space-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 0.45em;
            font-weight: 600;
            font-size: 1.125rem;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.02em;
            font-family: var(--font-display);
            padding: 6px 14px;
            white-space: nowrap;
            transition: color var(--transition-fast), transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Camera-viewfinder frame: four corner brackets, drawn via 8 gradient
           strips on a single ::before. Hidden by default, springs in on hover. */
        .nav-logo::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(var(--accent), var(--accent)) top left     / 11px 2px no-repeat,
                linear-gradient(var(--accent), var(--accent)) top left     / 2px 11px no-repeat,
                linear-gradient(var(--accent), var(--accent)) top right    / 11px 2px no-repeat,
                linear-gradient(var(--accent), var(--accent)) top right    / 2px 11px no-repeat,
                linear-gradient(var(--accent), var(--accent)) bottom left  / 11px 2px no-repeat,
                linear-gradient(var(--accent), var(--accent)) bottom left  / 2px 11px no-repeat,
                linear-gradient(var(--accent), var(--accent)) bottom right / 11px 2px no-repeat,
                linear-gradient(var(--accent), var(--accent)) bottom right / 2px 11px no-repeat;
            opacity: 0;
            transform: scale(0.78);
            transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        /* Aperture icon sits before the name; spins in on hover. */
        .nav-logo-iris {
            width: 1.05em;
            height: 1.05em;
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-logo:hover {
            color: var(--accent);
            transform: scale(1.02);
        }

        .nav-logo:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .nav-logo:hover .nav-logo-iris {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* ----- Camera iris-diaphragm shutter (logo click) -----
           The overlay is a black rectangle with an octagonal HOLE cut out
           by an SVG mask. The hole starts wide open (page visible through
           it), shrinks to nothing (full blackout while we hard-jump to top),
           a flash fires, then the hole re-opens. Everything outside the
           hole is always solid black - no parts of the page leak through. */
        .shutter-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            overflow: hidden;
        }

        .iris-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .iris-hole {
            transform-box: fill-box;
            transform-origin: 50% 50%;
            animation: irisClose 1.8s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        }

        @keyframes irisClose {
            0%   { transform: scale(2.4) rotate(0deg);   }   /* open: hole bigger than viewport, page fully visible */
            38%  { transform: scale(0)   rotate(35deg);  }   /* closed: hole gone, full blackout */
            62%  { transform: scale(0)   rotate(55deg);  }   /* HOLD closed for ~430ms - the photo moment */
            100% { transform: scale(2.4) rotate(90deg);  }   /* open again on the newly-scrolled page */
        }


        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color var(--transition-fast);
            cursor: pointer;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform var(--transition-base);
        }

        .nav-link:hover { color: var(--text-primary); }
        .nav-link.active { color: var(--accent); }
        .nav-link.active::after { transform: scaleX(1); }

        .nav-link-chevron {
            display: none;
        }

        /* Hamburger menu button — hidden on desktop, revealed by the
           mobile media query. Three bars morph into an X when .menu-open
           is added to the parent nav. */
        .nav-toggle {
            display: none;
            background: transparent;
            border: 0;
            cursor: pointer;
            padding: 0;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            transition: background var(--transition-fast);
        }

        .nav-toggle:hover { background: var(--accent-light); }

        .nav-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 1px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.2s ease;
            transform-origin: center;
        }

        .nav.menu-open .nav-toggle span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }
        .nav.menu-open .nav-toggle span:nth-child(2) { opacity: 0; }
        .nav.menu-open .nav-toggle span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* News Section */
        .news-section {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: var(--space-lg) 0;
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
        }

        .news-list {
            display: grid;
            gap: 0.75rem;
            max-height: 350px;
            overflow-y: auto;
            padding-right: var(--space-sm);
            /* Big top buffer: at scrollTop=0 the first item sits below this
               empty space, so the top news is fully visible for several
               seconds before the drift carries it off-screen. */
            padding-top: 3.5rem;
            padding-bottom: 1.5rem;
            scroll-behavior: auto;
            /* Feathered top/bottom edges - items fade in/out at the scroll boundaries. */
            -webkit-mask-image: linear-gradient(to bottom,
                transparent 0,
                #000 28px,
                #000 calc(100% - 28px),
                transparent 100%);
            mask-image: linear-gradient(to bottom,
                transparent 0,
                #000 28px,
                #000 calc(100% - 28px),
                transparent 100%);
        }

        .news-list::-webkit-scrollbar { width: 5px; }
        .news-list::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 10px; }
        .news-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .news-item {
            display: block;
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-primary);
            border-radius: 0.5rem;
            border: 2px solid var(--border-color);
            transition: all var(--transition-fast);
            position: relative;
        }

        .news-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .news-item:hover::before { opacity: 1; }

        .news-item:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            transform: translateX(4px);
        }

        .news-date {
            color: var(--accent);
            font-weight: 700;
            font-size: 1rem;
            display: inline;
            margin-right: 0.5rem;
        }

        .news-date::before {
            content: '>';
            font-size: 1rem;
            display: inline-block;
            margin-right: 0.25rem;
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }

        .news-description {
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 1.0625rem;
            font-weight: 500;
            display: inline;
        }

        .news-description a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 2px solid var(--accent);
        }

        .news-autoscroll-toggle {
            background: var(--bg-primary);
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 0.375rem;
            padding: 0.375rem 0.75rem;
            font-size: 0.8125rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            transition: all var(--transition-fast);
        }

        .news-autoscroll-toggle:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .news-autoscroll-toggle svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--space-md);
            position: relative;
        }

        /* Section */
        .section {
            padding: var(--space-lg) 0 var(--space-md);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: var(--space-md);
            letter-spacing: -0.03em;
            color: var(--text-primary);
            position: relative;
            padding-bottom: 0.5rem;
            font-family: var(--font-display);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-lg);
        }

        .section-title::before {
            content: '//';
            position: absolute;
            left: -30px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: 700;
            opacity: 0.3;
            font-family: 'Courier New', monospace;
        }

        .section-title::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            border: 1.5px solid var(--accent);
            background: transparent;
            opacity: 0.25;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* concentric rings */
        #publications .section-title::after { border-radius: 50%; box-shadow: 0 0 0 8px rgba(30, 58, 95, 0.15), 0 0 0 16px rgba(30, 58, 95, 0.10); }
        #publications.visible .section-title::after { box-shadow: 0 0 0 12px rgba(30, 58, 95, 0.20), 0 0 0 24px rgba(30, 58, 95, 0.12); }

        /* overlapping circles */
        #experience .section-title::after { border-radius: 50%; box-shadow: 15px 0 0 0 rgba(30, 58, 95, 0.20), -15px 0 0 0 rgba(30, 58, 95, 0.20); }
        #experience.visible .section-title::after { box-shadow: 10px 0 0 0 rgba(30, 58, 95, 0.25), -10px 0 0 0 rgba(30, 58, 95, 0.25); }

        /* square morphing to diamond */
        #projects .section-title::after { border-radius: 0; box-shadow: inset 0 0 0 10px rgba(30, 58, 95, 0.15); }
        #projects.visible .section-title::after { transform: translateY(-50%) rotate(45deg); box-shadow: inset 0 0 0 8px rgba(30, 58, 95, 0.20); }

        /* diamond */
        #skills .section-title::after { transform: translateY(-50%) rotate(45deg); border-radius: 0; box-shadow: 0 0 0 8px rgba(30, 58, 95, 0.12), 0 0 0 16px rgba(30, 58, 95, 0.08); }
        #skills.visible .section-title::after { transform: translateY(-50%) rotate(90deg); box-shadow: 0 0 0 10px rgba(30, 58, 95, 0.15), 0 0 0 20px rgba(30, 58, 95, 0.10); }

        /* pentagon */
        #gallery .section-title::after { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); border: none; background: rgba(30, 58, 95, 0.25); box-shadow: inset 0 0 0 8px rgba(30, 58, 95, 0.15); }
        #gallery.visible .section-title::after { clip-path: polygon(30% 0%, 70% 0%, 100% 50%, 70% 100%, 30% 100%, 0% 50%); box-shadow: inset 0 0 0 10px rgba(30, 58, 95, 0.20); }

        /* interlocking circles */
        #travel .section-title::after { border-radius: 50%; opacity: 0.3; box-shadow: 20px 0 0 -5px rgba(30, 58, 95, 0.20), -20px 0 0 -5px rgba(30, 58, 95, 0.20); }
        #travel.visible .section-title::after { box-shadow: 15px 0 0 -5px rgba(30, 58, 95, 0.25), -15px 0 0 -5px rgba(30, 58, 95, 0.25), 0 15px 0 -5px rgba(30, 58, 95, 0.20); }

        .news-header .section-title { margin-bottom: 0; }
        .news-header .section-title::after { display: none; }

        /* Hero */
        .hero {
            min-height: auto;
            display: flex;
            align-items: center;
            padding-top: 100px;
            padding-bottom: var(--space-md);
            position: relative;
            overflow: hidden;
        }

        .hero-grid {
            position: absolute;
            top: 6%;
            right: 1%;
            width: 260px;
            height: 260px;
            pointer-events: none;
            z-index: 0;
            overflow: visible;
            /* Soft elliptical fade hides the rectangular boundary so lines feel
               like they're appearing in open space, not inside a visible box. */
            -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 18%, transparent 82%);
                    mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 18%, transparent 82%);
        }

        .hero-grid-line {
            stroke: var(--accent);
            stroke-width: 1;
            fill: none;
            stroke-linecap: round;
            /* pathLength="100" on each <line> normalises the path so the same
               dasharray works for any segment length. dash = 100; offset starts
               at +100 (invisible), sweeps to 0 (fully drawn), then -100 (wiped). */
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            opacity: 0;
            animation-name: heroLineDraw;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0.65, 0, 0.35, 1);
            will-change: stroke-dashoffset, opacity;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 20%;
            left: 5%;
            width: 90px;
            height: 90px;
            border: 1px solid var(--accent);
            opacity: 0.15;
            pointer-events: none;
            animation: morphThin 8s ease-in-out infinite;
        }

        @keyframes heroLineDraw {
            /* Each line is "alive" for roughly half its cycle; the four sides
               of a square share the same delay so they form together. */
            0%   { stroke-dashoffset: 100;  opacity: 0;    }
            4%   { stroke-dashoffset: 100;  opacity: 0.35; }
            22%  { stroke-dashoffset: 0;    opacity: 0.35; }
            42%  { stroke-dashoffset: 0;    opacity: 0.35; }
            58%  { stroke-dashoffset: -100; opacity: 0.35; }
            62%  { stroke-dashoffset: -100; opacity: 0;    }
            100% { stroke-dashoffset: -100; opacity: 0;    }
        }

        @keyframes morphThin {
            0%, 100% { transform: rotate(0deg);   border-radius: 8px; }
            33%      { transform: rotate(120deg); border-radius: 50%; }
            66%      { transform: rotate(240deg); border-radius: 0; }
        }

        .hero-wrapper {
            display: flex;
            align-items: center;
            gap: var(--space-xl);
            position: relative;
            z-index: 1;
        }

        .hero-image-wrapper {
            flex-shrink: 0;
            position: relative;
        }

        .hero-image-wrapper::before,
        .hero-image-wrapper::after {
            content: '';
            position: absolute;
            top: -18px;
            left: -18px;
            right: -18px;
            bottom: -18px;
            z-index: -1;
            pointer-events: none;
            background-repeat: no-repeat;
        }

        /* Top-left + top-right brackets */
        .hero-image-wrapper::before {
            background-image:
                linear-gradient(#000, #000),
                linear-gradient(#000, #000),
                linear-gradient(#000, #000),
                linear-gradient(#000, #000);
            background-size: 70px 3px, 3px 70px, 70px 3px, 3px 70px;
            background-position: top left, top left, top right, top right;
        }

        /* Bottom-left + bottom-right brackets */
        .hero-image-wrapper::after {
            background-image:
                linear-gradient(#000, #000),
                linear-gradient(#000, #000),
                linear-gradient(#000, #000),
                linear-gradient(#000, #000);
            background-size: 70px 3px, 3px 70px, 70px 3px, 3px 70px;
            background-position: bottom left, bottom left, bottom right, bottom right;
        }

        .hero-image {
            display: block; /* drop baseline space so corner brackets sit symmetrically */
            position: relative;
            width: 280px;
            height: 400px;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid #000;
            transition: all var(--transition-base);
        }

        .hero-image:hover { transform: scale(1.05); }

        .hero-content { flex: 1; }

        .hero-name {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-family: var(--font-display);
            /* Reserve a line of height so the line doesn't pop in as
               characters are typed. */
            min-height: 1.1em;
        }

/* Chunky vertical caret. The span itself is zero-width so it
           doesn't wedge surrounding characters apart when it sits in
           the middle of text; the bar is drawn as a centered ::after
           overlay. Text reads as :') -> :) -> :)) with the caret
           sitting at the boundary, not occupying its own slot. */
        .hero-cursor {
            display: inline-block;
            position: relative;
            width: 0;
            height: 1em;
            vertical-align: -0.12em;
            animation: heroCursorBlink 1s steps(1, end) infinite;
        }

        .hero-cursor::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 6px;
            height: 1.05em;
            background: #d62828;
            transform: translateX(-50%);
            border-radius: 1px;
        }

        @keyframes heroCursorBlink {
            0%, 50%      { opacity: 1; }
            50.01%, 100% { opacity: 0; }
        }

        /* Word-style selection highlight on the typed name. */
        .hero-name-sel {
            background: rgba(30, 58, 95, 0.28);
            border-radius: 2px;
        }

        /* Underline drawn under the formatted range. Thick enough to read
           against the heavy display font; offset a touch so it sits below
           descenders. */
        .hero-name-ul {
            text-decoration: underline;
            text-decoration-color: var(--accent);
            text-decoration-thickness: 3px;
            text-underline-offset: 6px;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Pulsing red ring for the home (Huntsville) marker on the travel map. */
        @keyframes homePulse {
            0%   { r: 5;  opacity: 0.55; }
            100% { r: 22; opacity: 0;    }
        }
        .home-pulse {
            fill: #d62828;
            transform-box: fill-box;
            transform-origin: center;
            animation: homePulse 1.8s ease-out infinite;
        }

        .hero-expertise {
            font-size: 1.4rem;
            color: var(--accent);
            margin-bottom: 0.75rem;
            font-weight: 600;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
        }

        .hero-accent {
            color: var(--accent);
            font-weight: 600;
            position: relative;
            padding: 0 0.15rem;
        }

        .hero-bio {
            font-size: 1.0625rem;
            color: var(--text-secondary);
            line-height: 1.65;
            margin-bottom: 1rem;
            text-align: justify;
            hyphens: auto;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s backwards;
        }

        .hero-bio a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-light);
        }

        .hero-bio a:hover { border-bottom-color: var(--accent); }

        .hero-links {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s backwards;
        }

        .hero-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.25rem;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all var(--transition-fast);
            border: 1.5px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .hero-link svg {
            flex-shrink: 0;
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center;
        }

        .hero-link:hover svg {
            transform: rotate(360deg) scale(1.15);
        }

        .hero-link.primary:hover svg {
            transform: rotate(-360deg) scale(1.15);
        }

        .hero-link:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--text-tertiary);
            transform: translateY(-2px);
        }

        .hero-link.primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .hero-link.primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: 0 4px 12px var(--accent-light);
        }

        /* Stats */
        .stats {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: var(--space-xs) var(--space-sm);
            text-align: center;
            transition: all var(--transition-base);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-card:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px var(--shadow);
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
            font-family: var(--font-display);
            font-variant-numeric: tabular-nums;
        }

        /* Counter: reserve final width via an invisible ghost so the card stops reflowing every tick */
        .stat-number--counter {
            position: relative;
            display: inline-block;
        }
        .stat-number-ghost { visibility: hidden; }
        .stat-number-value {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
        }

        .stat-card {
            padding: 0.6rem 1rem;
        }

        /* Top-venues marquee: compact card, venue names scroll horizontally.
           Width adapts to the row's remaining space so the card stays inside
           the section column on narrow viewports instead of overflowing right. */
        .stat-card--marquee {
            padding-right: 0.75rem;
            flex: 1 1 0;
            min-width: 0;
        }

        .stat-marquee {
            flex: 1 1 0;
            min-width: 0;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
        }

        .stat-marquee-track {
            display: flex;
            align-items: center;
            width: max-content;
            animation: statMarqueeSlide 36s linear infinite;
        }

        .stat-marquee-item {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
            font-family: var(--font-display);
            white-space: nowrap;
            margin-right: 2rem;
        }

        @keyframes statMarqueeSlide {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        /* Publications */
        .publication-card-enhanced {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: var(--space-md);
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 0.75rem;
            padding: var(--space-sm);
            margin-bottom: var(--space-sm);
            transition: all var(--transition-normal);
            align-items: stretch;
            position: relative;
            overflow: visible;
        }

        .publication-card-enhanced:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow-md);
        }

        .publication-image {
            position: relative;
            width: 180px;
            min-height: 160px;
            border-radius: 0.5rem;
            overflow: hidden;
            background: var(--bg-tertiary);
            cursor: zoom-in;
        }

        .publication-image img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-base);
        }

        .publication-image:hover img {
            transform: scale(1.04);
        }

        /* Big centered "+" affordance over the thumbnail on hover - hints
           that the image can be expanded further. Dims the underlying image
           so the plus reads clearly. */
        .publication-image::before {
            content: '+';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: var(--font-body);
            font-size: 3.5rem;
            font-weight: 300;
            line-height: 1;
            background: rgba(0, 0, 0, 0.42);
            opacity: 0;
            transition: opacity var(--transition-fast);
            pointer-events: none;
            z-index: 2;
        }

        .publication-image:hover::before,
        .publication-image:focus-visible::before {
            opacity: 1;
        }

        /* Lightbox modal for full-size image. Fully covers the viewport
           (including the navbar) - z-index sits above the nav (100) and the
           shutter overlay (9999). */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(8, 8, 8, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: lightboxFadeIn 0.28s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            cursor: zoom-out;
            overscroll-behavior: contain;
            touch-action: none;
        }

        .lightbox-overlay.closing {
            animation: lightboxFadeOut 0.22s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        .lightbox-frame {
            position: relative;
            display: inline-block;
            max-width: 92vw;
            max-height: 92vh;
            cursor: default;
            opacity: 0;
            transform: scale(0.94);
            animation: lightboxZoomIn 0.32s cubic-bezier(0.16, 1, 0.3, 1) 0.04s forwards;
            line-height: 0;
        }

        .lightbox-overlay.closing .lightbox-frame {
            animation: lightboxZoomOut 0.22s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        .lightbox-image {
            display: block;
            max-width: 92vw;
            max-height: 92vh;
            width: auto;
            height: auto;
            border-radius: 0.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.65);
        }

        .lightbox-close {
            position: absolute;
            top: -14px;
            right: -14px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: white;
            border: none;
            color: #111;
            font-size: 22px;
            font-weight: 400;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            transition: transform var(--transition-fast), background var(--transition-fast);
            z-index: 2;
        }

        .lightbox-close:hover {
            background: #f0f0f0;
            transform: scale(1.08);
        }

        @media (max-width: 600px) {
            .lightbox-close {
                top: 8px;
                right: 8px;
                width: 36px;
                height: 36px;
                font-size: 20px;
            }
        }

        @keyframes lightboxFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes lightboxFadeOut {
            from { opacity: 1; }
            to   { opacity: 0; }
        }

        @keyframes lightboxZoomIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }

        @keyframes lightboxZoomOut {
            from { opacity: 1; transform: scale(1); }
            to   { opacity: 0; transform: scale(0.96); }
        }

        .publication-details {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            min-height: 160px;
            justify-content: space-between;
        }

        .publication-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .publication-authors {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
        }

        .publication-venue {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.95rem;
            margin: 0;
        }

        .publication-abstract {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
            padding: var(--space-xs);
            background: var(--bg-tertiary);
            border-radius: 0.5rem;
            border-left: 3px solid var(--accent);
            margin: 0;
        }

        .publication-abstract strong { color: var(--accent); font-weight: 600; }

        .publication-links {
            display: flex;
            gap: 0.375rem;
            flex-wrap: wrap;
        }

        .publication-link {
            padding: 0.375rem 0.75rem;
            background: var(--accent-light);
            color: var(--accent);
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 600;
            transition: all var(--transition-fast);
            border: 1px solid transparent;
        }

        .publication-link:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px var(--accent-light);
        }

        /* Projects */
        .projects-caption {
            margin: -0.25rem 0 var(--space-md);
            color: var(--text-secondary);
            font-style: italic;
            font-size: 0.95rem;
            max-width: 640px;
            line-height: 1.5;
        }
        .projects-caption em { color: var(--accent); font-style: italic; }

        .project-filters {
            display: flex;
            gap: 0.625rem;
            margin-bottom: var(--space-md);
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.45rem 1rem;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 0.85rem;
            font-family: var(--font-body);
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 2px 8px var(--accent-light);
        }

        .projects-grid {
            display: flex;
            gap: var(--space-md);
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--bg-tertiary);
            padding-bottom: var(--space-sm);
        }

        .projects-grid::-webkit-scrollbar { height: 8px; }
        .projects-grid::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 4px; }
        .projects-grid::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        .project-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: all var(--transition-base);
            cursor: pointer;
            position: relative;
            flex: 0 0 320px;
            min-width: 320px;
        }

        .project-card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 24px var(--shadow);
            transform: translateY(-4px);
        }

        .project-image-wrapper {
            position: relative;
            overflow: hidden;
            height: 180px;
        }

        .project-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }

        .project-card:hover .project-image { transform: scale(1.08); }

        .project-content { padding: var(--space-md); }

        .project-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .project-abstract {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: var(--space-sm);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .project-tags {
            display: flex;
            gap: 0.375rem;
            flex-wrap: wrap;
            margin-bottom: var(--space-sm);
        }

        .project-tag {
            padding: 0.25rem 0.625rem;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 0.375rem;
            font-size: 0.6875rem;
            font-weight: 600;
        }

        .project-links { display: flex; gap: 0.5rem; }

        .project-link {
            padding: 0.375rem 0.875rem;
            background: var(--accent-light);
            color: var(--accent);
            text-decoration: none;
            border-radius: 0.375rem;
            font-size: 0.8125rem;
            font-weight: 600;
            transition: all var(--transition-fast);
            border: 1px solid transparent;
        }

        .project-link:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px var(--accent-light);
        }

        /* Experience Timeline */
        .timeline {
            position: relative;
            padding-left: 48px;
        }

        .timeline-item {
            position: relative;
            padding-bottom: var(--space-lg);
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.6s ease;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: var(--space-lg);
            align-items: flex-start;
        }

        .timeline-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        /* Dot — explicitly centered on the rail via translateX(-50%) */
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -39px;  /* rail center: padding-left (48px) - rail-x (9px) inwards = -39 in item coords */
            top: 6px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            border: 3px solid var(--bg-primary);
            box-shadow: 0 0 0 2px var(--accent);
            transform: translateX(-50%);
            transition: all var(--transition-base);
            z-index: 2;
        }

        .timeline-item:hover::before {
            transform: translateX(-50%) scale(1.3);
            box-shadow: 0 0 0 8px var(--accent-light), 0 0 12px var(--accent);
        }

        /* Connector — vertical line from this dot to the next dot's center.
           Last item has no ::after, so the rail ends exactly at the final dot. */
        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: -39px;
            top: 24px;        /* below this dot (top 6 + height 18) */
            bottom: -15px;    /* into the next item, ending at next dot's center */
            width: 2px;
            transform: translateX(-50%);
            background: var(--accent);
        }

        .timeline-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.15rem;
            white-space: nowrap;
        }

        .timeline-location {
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }

        .timeline-dates {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .timeline-company {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.15rem;
            color: var(--text-primary);
            font-family: var(--font-display);
        }

        /* Slow grow + underline-wipe on the company name when hovering the card. */
        .timeline-company a {
            display: inline-block;
            position: relative;
            transform-origin: left center;
            transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                        color 0.55s ease;
        }

        .timeline-company a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 100%;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .timeline-item:hover .timeline-company a {
            transform: scale(1.06);
            color: var(--accent);
        }

        .timeline-item:hover .timeline-company a::after {
            transform: scaleX(1);
        }

        .timeline-title {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.15rem;
        }

        .timeline-period {
            color: var(--text-tertiary);
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .timeline-description {
            color: var(--text-secondary);
            line-height: 1.55;
            font-size: 0.95rem;
        }

        .timeline-description a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-light);
        }

        .timeline-description a:hover { border-bottom-color: var(--accent); }

        .timeline-bullets {
            margin: 0.5rem 0 0;
            padding-left: 1.2rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.55;
        }

        .timeline-bullets li {
            margin-bottom: 0.35rem;
        }

        .timeline-bullets li::marker { color: var(--accent); }

        .timeline-bullets a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-light);
        }

        .timeline-bullets a:hover { border-bottom-color: var(--accent); }

        /* Awards / Achievements - 3D Cover Flow carousel */
        .coverflow-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            height: 440px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
            padding: var(--space-md) 0;
            user-select: none;
            touch-action: pan-y;
        }

        .coverflow-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        .coverflow-item {
            position: absolute;
            width: 480px;
            aspect-ratio: 4/3;
            max-width: 90%;
            border-radius: var(--radius-lg);
            border: 2px solid var(--border-color);
            overflow: hidden;
            background: var(--bg-secondary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: transform 0.45s cubic-bezier(0.25, 1, 0.5, 1), 
                        opacity 0.45s cubic-bezier(0.25, 1, 0.5, 1), 
                        box-shadow 0.45s cubic-bezier(0.25, 1, 0.5, 1),
                        border-color 0.45s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* 3D cover flow layers based on relative diff (adjusted for 480px wide cards) */
        .coverflow-item.active {

      "email": {{ site.data.aboutme.Email | remove: 'mailto:' | jsonify }},
      "worksFor": {
        "@type": "Organization",
        "name": {{ site.data.experience[0].company | jsonify }}{% if site.data.experience[0].url %},
        "url": {{ site.data.experience[0].url | jsonify }}{% endif %}
      },
      "knowsAbout": [{% assign sep = "" %}{% for cat in site.data.skills.categories %}{% for s in cat.skills %}{{ sep }}{{ s | jsonify }}{% assign sep = "," %}{% endfor %}{% endfor %}],
      "sameAs": [{% assign sep = "" %}{% if site.data.aboutme.Scholar %}{{ sep }}{{ site.data.aboutme.Scholar | jsonify }}{% assign sep = "," %}{% endif %}{% if site.data.aboutme.Github %}{{ sep }}{{ site.data.aboutme.Github | jsonify }}{% assign sep = "," %}{% endif %}{% if site.data.aboutme.LinkedIn %}{{ sep }}{{ site.data.aboutme.LinkedIn | jsonify }}{% assign sep = "," %}{% endif %}{% if site.data.aboutme.Twitter %}{{ sep }}{{ site.data.aboutme.Twitter | jsonify }}{% assign sep = "," %}{% endif %}]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": {{ site.data.aboutme.Name | append: " - Publications" | jsonify }},
      "itemListElement": [{% for pub in site.data.publications %}
        {
          "@type": "ListItem",
          "position": {{ forloop.index }},
          "item": {
            "@type": "ScholarlyArticle",
            "name": {{ pub.paper | strip | jsonify }},
            "author": {{ pub.author | markdownify | strip_html | strip_newlines | strip | jsonify }},
            "publication": {{ pub.pub | strip_newlines | strip | jsonify }}{% if pub.paper_link %},
            "url": {{ pub.paper_link | jsonify }}{% endif %}{% if pub.abstract %},
            "abstract": {{ pub.abstract | markdownify | strip_html | strip_newlines | strip | jsonify }}{% endif %}
          }
        }{% unless forloop.last %},{% endunless %}{% endfor %}
      ]
    }
    </script>
</head>
<body>
    <div id="root"></div>

    {% comment %}
    Crawler / no-JS fallback. This site renders client-side via React, so bots
    and LLM fetchers that do not run JavaScript would otherwise see no content.
    It must NOT be wrapped in <noscript>: readability extractors (and Claude's
    web fetch) strip <noscript> before reading, which is why earlier fetches
    returned only meta tags. Instead this is real DOM content rendered from
    _data/*.yml; it is hidden from sighted users only after JS confirms it is
    running (the html.js class set in <head>), and stays visible for genuine
    no-JS visitors. Hiding is via a stylesheet rule, not inline style/hidden/
    aria-hidden, so extractors still treat it as visible text. Always current.
    {% endcomment %}
    <main id="static-content">
      <h1>{{ site.data.aboutme.Name }}</h1>
      <p>{{ site.data.aboutme.Area_Of_Expertise | replace: '|', '&middot;' | strip }} &middot; {{ site.data.experience[0].title }} at {{ site.data.experience[0].company }}</p>
      <div>{{ site.data.aboutme.Bio_Short | markdownify }}</div>

      <h2>Profiles</h2>
      <ul>
        {% if site.data.aboutme.Scholar %}<li><a href="{{ site.data.aboutme.Scholar }}" rel="me">Google Scholar</a></li>{% endif %}
        {% if site.data.aboutme.Github %}<li><a href="{{ site.data.aboutme.Github }}" rel="me">GitHub</a></li>{% endif %}
        {% if site.data.aboutme.LinkedIn %}<li><a href="{{ site.data.aboutme.LinkedIn }}" rel="me">LinkedIn</a></li>{% endif %}
        {% if site.data.aboutme.Twitter %}<li><a href="{{ site.data.aboutme.Twitter }}" rel="me">Twitter/X</a></li>{% endif %}
        {% if site.data.aboutme.Email %}<li><a href="{{ site.data.aboutme.Email }}">Email</a></li>{% endif %}
      </ul>

      <h2>Publications</h2>
      <ul>
        {% for pub in site.data.publications %}<li><a href="{{ pub.paper_link | default: pub.project_page | default: pub.code_link }}">{{ pub.paper | strip }}</a>. {{ pub.author | markdownify | strip_html | strip_newlines | strip }}. {{ pub.pub | strip_newlines | strip }}.</li>
        {% endfor %}
      </ul>

      <h2>Experience</h2>
      {% for job in site.data.experience %}<h3>{{ job.title }}, {% if job.url %}<a href="{{ job.url }}">{{ job.company }}</a>{% else %}{{ job.company }}{% endif %} ({{ job.date }})</h3>
      <div>{{ job.description | markdownify }}</div>
      {% if job.bullets %}<ul>{% for bullet in job.bullets %}<li>{{ bullet | markdownify | strip_html | strip }}</li>{% endfor %}</ul>{% endif %}
      {% endfor %}

      <h2>Projects</h2>
      <ul>
        {% for proj in site.data.projects %}<li>{{ proj.title }}{% if proj.github %} (<a href="{{ proj.github }}">code</a>){% endif %}{% if proj.paper %} (<a href="{{ proj.paper }}">paper</a>){% endif %}</li>
        {% endfor %}
      </ul>

      <h2>Recognition</h2>
      <ul>
        {% for ach in site.data.achievements %}<li>{% if ach.link %}<a href="{{ ach.link }}">{{ ach.title }}</a>{% else %}{{ ach.title }}{% endif %} ({{ ach.date }}): {{ ach.description | strip }}</li>
        {% endfor %}
      </ul>

      <h2>News</h2>
      <ul>
        {% for item in site.data.news.news limit: site.data.news.k %}<li>{{ item.date }}: {{ item.description | markdownify | strip_html | strip }}</li>
        {% endfor %}
      </ul>

      <p>A complete plain-text version of this profile for language models is
      available at <a href="{{ '/llms.txt' | absolute_url }}">/llms.txt</a>.</p>
    </main>

    <!-- Jekyll-rendered JSON data blocks. React reads these on mount. -->
    <script type="application/json" id="data-aboutme">{{ site.data.aboutme | jsonify }}</script>
    <script type="application/json" id="data-news">{{ site.data.news | jsonify }}</script>
    <script type="application/json" id="data-publications">{{ site.data.publications | jsonify }}</script>
    <script type="application/json" id="data-projects">{{ site.data.projects | jsonify }}</script>
    <script type="application/json" id="data-experience">{{ site.data.experience | jsonify }}</script>
    <script type="application/json" id="data-skills">{{ site.data.skills | jsonify }}</script>
    <script type="application/json" id="data-achievements">{{ site.data.achievements | jsonify }}</script>
    <script type="application/json" id="data-travel">{{ site.data.travel | jsonify }}</script>

    <!-- React app, pre-compiled from src/app.jsx by Babel at build time (npm run build:js / CI). No in-browser transpile. -->
    <script src="{{ '/assets/js/app.js' | relative_url }}" defer></script>
</body>
</html>
