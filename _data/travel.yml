# Travel Chronicles map data.
# `cities` is rendered as markers on a D3 Albers-USA SVG projection.
#
# Required fields:
#   name        - label shown next to the marker
#   lat, lng    - WGS84 coordinates fed into d3.geoAlbersUsa()
#   description - one-line context shown in the hover tooltip
#   year        - year(s) visited
#   image       - relative image path shown in the tooltip
#   type        - 'city' (concentric circles marker) or 'park' (triangle marker)
#
# Optional (only used when type=city, controls label positioning):
#   textAnchor  - SVG text-anchor: 'start' | 'middle' | 'end'
#   offsetX     - x offset of label from marker (px)
#   offsetY     - y offset of label from marker (px)

cities:
  - name: Huntsville
    lat: 34.7304
    lng: -86.5861
    description: NASA IMPACT - Research Scientist
    year: 2024-Present
    image: img/portfolio/surya.webp
    type: city
    textAnchor: end
    offsetX: -15
    offsetY: 5

