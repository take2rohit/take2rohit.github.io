# Travel Chronicles map data.
# `cities` is rendered as markers on a D3 Albers-USA SVG projection.
#
# Required fields:
#   name        - label shown next to the marker
#   lat, lng    - WGS84 coordinates fed into d3.geoAlbersUsa()
#   description - tooltip blurb. HARD LIMIT: 8 words or fewer. Punchy
#                 and concrete (e.g. "Misty blue ridges and 1,500 black bears")
#                 beats generic ("Great national park").
#   image       - URL or relative path shown in the tooltip
#   type        - 'city' (concentric circles marker) or 'park' (triangle marker)
#
# Optional:
#   home               - true for the city Rohit currently lives in
#                        (renders red marker + pulsing ring + bold red label)
#   textAnchor         - SVG text-anchor: 'start' | 'middle' | 'end'
#   offsetX            - x offset of label from marker (px)
#   offsetY            - y offset of label from marker (px)
#   image_credit       - short attribution text (e.g. "Wikipedia: Huntsville, AL")
#   image_credit_url   - link clicked from the tooltip credit line
#
# TODO: swap the Wikipedia placeholder URLs below for Rohit's own photos.
# All current `image:` values point to Wikimedia-Commons thumbnails licensed
# CC-BY-SA or public domain. Source page is in `image_credit_url`.

cities:
  - name: Huntsville
    lat: 34.7304
    lng: -86.5861
    description: NASA ODSI - Research Scientist
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Huntsville_Art_Museum_-_front_fa%C3%A7ade_and_stairs_2023.jpg/500px-Huntsville_Art_Museum_-_front_fa%C3%A7ade_and_stairs_2023.jpg
    image_credit: Wikipedia
    image_credit_url: https://en.wikipedia.org/wiki/Huntsville%2C_Alabama
    type: city
    home: true
    textAnchor: end
    offsetX: -15
