- company: NASA - ODSI (Office of Data Science) / UAH
  url: https://impact.earthdata.nasa.gov/
  title: Computer Scientist II
  date: May 2024 - Present
  location: Huntsville, AL, USA
  description: >
    Building and scaling AI Foundation Models for Science.
  bullets:
    - "**Weather Foundation Model:** Contributed to training [Prithvi WxC](https://research.ibm.com/blog/foundation-model-weather-climate),
      a 2.3B-parameter open-source weather and climate model on NASA MERRA-2 data; designed
      fine-tuning for autoregressive rollout forecasting, downscaling, and gravity-wave
      flux parameterization. [[NASA report]](https://science.nasa.gov/open-science/ai-model-weather-climate/)"
    - "**Helio Foundation Model:** Built [Surya](https://arxiv.org/abs/2508.14112), the
      first heliospheric foundation model on 300TB of Solar Dynamics Observatory data —
      explored Swin, Hiera, MaxViT, and multi-modal architectures. Close collaboration
      with IBM, Microsoft, and NVIDIA."
    - "**Scaling:** Trained these foundation models across 200+ A100 GPU clusters (Jülich
      supercomputing, DGX) with SLURM, PyTorch FSDP, Lightning, and Hugging Face
      Accelerate."

- company: University of California, Riverside
  url: https://vcg.ece.ucr.edu/
  title: Graduate Student Researcher, Visual Computing Group
  date: Jan 2023 - Dec 2023
  location: Riverside, CA, USA
  description: >
    MS by Research with [Prof. Amit K. Roy-Chowdhury](https://vcg.ece.ucr.edu/amit).
  bullets:
    - "**Pose Estimation:** State-of-the-art results on occluded human pose estimation for
      the [STRIDE](https://sites.google.com/ucr.edu/stride/home) project, supporting
      downstream motion correction, prediction, and infilling."
    - "**Biometric Recognition:** Built unsupervised pipelines for 3D/2D human pose,
      body-part segmentation, and silhouette extraction under occlusion for the
      [IARPA BRIAR](https://www.iarpa.gov/research-programs/briar) program — joint work
      with USC, Northwestern, and EPFL."
    - "**Trustworthy AI:** TA for EE260B covering reinforcement learning,
      out-of-distribution generalization, explainability, uncertainty estimation, safety,
      and robustness."

- company: Indian Institute of Science (IISc), Bangalore
  url: https://iisc.ac.in/
