  date: Jul 2021 - Jul 2022
  location: Bengaluru, India
  description: >
    At the [Visual Computing Lab](https://visual-computing.in/) with
    [Dr. Anirban Chakraborty](https://scholar.google.co.in/citations?user=NtAsZK-2HjcC&hl=en).
  bullets:
    - "**Source-free Domain Adaptation:** Proposed [CoNMix](https://sites.google.com/view/conmix-vcl),
