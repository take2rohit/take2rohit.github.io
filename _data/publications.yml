    that generalizes across forecasting, downscaling, gravity-wave
    parameterization, and hurricane-track prediction — released openly on
    Hugging Face.

- paper: "Layer-wise Alignment: Examining Safety Alignment Across Image Encoder Layers in Vision Language Models"
  author: "Saketh Bachu, Erfan Shayegani, **Rohit Lal**, Trishna Chakraborty, Arindam Dutta, Chengyu Song, Yue Dong, Nael Abu-Ghazaleh, Amit K. Roy-Chowdhury"
  pub: "ICML 2025 (Spotlight — top 2.6%)"
  type: "Conference"
  paper_link: https://arxiv.org/abs/2411.04291
  project_page:
  code_link:
  bibtex:
  video:
  image: img/papers/voccl3d.png
  abstract: >
    Shows that harmful information in vision-language models is unevenly
    distributed across image-encoder layers — exposing a layer-dependent
    safety-alignment weakness exploitable by jailbreak attacks.

- paper: "STRIDE: Single-Video based Temporally Continuous Occlusion-Robust 3D Pose Estimation"
  author: "**Rohit Lal**, Saketh Bachu, Yash Garg, Arindam Dutta, Calvin-Khang Ta, Dripta S. Raychaudhuri, Hannah Dela Cruz, M. Salman Asif, Amit K. Roy-Chowdhury"
  pub: "WACV 2025 (Oral)"
  type: "Conference"
  paper_link: https://arxiv.org/abs/2312.16221
  project_page: https://sites.google.com/ucr.edu/stride/home
  code_link: https://github.com/take2rohit/STRIDE
  bibtex: https://scholar.googleusercontent.com/scholar.bib?q=info:1qHf02jQ-hMJ:scholar.google.com/&output=citation&scisdr=ClF_9LdCEIet2UyO5kY:AFWwaeYAAAAAZ_6I_kZCW4yLGm_EZsKjjUP3tjs&scisig=AFWwaeYAAAAAZ_6I_jEIQlNnJmF1OhDbt01gbuM&scisf=4&ct=citation&cd=-1&hl=en
  video:
