- paper: Prithvi WxC - Foundation model for weather and climate
  author: J Schmude, S Roy,...,Rohit Lal,...,
  pub: International Journal of Computer Vision (IJCV)
  type: arXiv preprint
  paper_link: https://arxiv.org/abs/2409.13598
  project_page:
  code_link: https://github.com/NASA-IMPACT/Prithvi-WxC
  bibtex:
  video:
  image: img/portfolio/word_emb.webp
  abstract: >
    A 2.3B-parameter foundation model for atmospheric science trained on MERRA-2
    reanalysis data — generalizes across forecasting, downscaling, and gravity-wave
    parameterization tasks.

- paper: STRIDE - Single-Video Based Temporally Continuous Occlusion-Robust 3D Pose Estimation
  author: Rohit Lal, Saketh Bachu, Yash Garg, Arindam Dutta, Calvin-Khang Ta, Hannah D. Cruz
  pub: Winter Conference on Applications of Computer Vision (WACV), 2025
  type: Conference
  project_page: https://sites.google.com/ucr.edu/stride/home
  paper_link:
  code_link: https://github.com/take2rohit/STRIDE
  bibtex: https://scholar.googleusercontent.com/scholar.bib?q=info:1qHf02jQ-hMJ:scholar.google.com/&output=citation&scisdr=ClF_9LdCEIet2UyO5kY:AFWwaeYAAAAAZ_6I_kZCW4yLGm_EZsKjjUP3tjs&scisig=AFWwaeYAAAAAZ_6I_jEIQlNnJmF1OhDbt01gbuM&scisf=4&ct=citation&cd=-1&hl=en&scfhb=1
  video:
  image: img/portfolio/person.webp
  abstract: >
    STRIDE recovers temporally continuous 3D human pose from a single occluded
    video by jointly fitting an SMPL body model and a per-instance optical-flow
    prior — robust to heavy occlusions on the IARPA BRIAR benchmark.

- paper: Prior-guided source-free domain adaptation for human pose estimation
  author: DS Raychaudhuri, CK Ta, A Dutta, Rohit Lal, AK Roy-Chowdhury
  pub: International Conference on Computer Vision (ICCV), 2023
  type: Conference
  project_page:
  paper_link: https://openaccess.thecvf.com/content/ICCV2023/papers/Raychaudhuri_Prior-guided_Source-free_Domain_Adaptation_for_Human_Pose_Estimation_ICCV_2023_paper.pdf
  code_link: https://github.com/driptaRC/POST
  bibtex: https://scholar.googleusercontent.com/scholar.bib?q=info:qdXH3DQ1PKYJ:scholar.google.com/&output=citation&scisdr=ClF_9LdCEIet2UyP99A:AFWwaeYAAAAAZ_6J79BRwy29ev7kCvjsXVOe0cM&scisig=AFWwaeYAAAAAZ_6J7xnaTNV67zd1CWpgTLzHo7Y&scisf=4&ct=citation&cd=-1&hl=en
  video:
  image: img/portfolio/balance.webp
  abstract: >
    POST adapts a 2D-pose network to new domains without access to source data,
    using a learned anatomical prior as a self-supervisory signal during target
    fine-tuning.

