    Test-time optimization that fits a per-instance optical-flow prior and an
    SMPL body model to a single occluded in-the-wild video — temporally smooth,
    occlusion-robust 3D human pose on the IARPA BRIAR benchmark.

- paper: "VOccl3D: A Video Benchmark Dataset for 3D Human Pose and Shape Estimation under Real Occlusions"
  author: "Yash Garg, Saketh Bachu, Arindam Dutta, **Rohit Lal**, Sarosij Bose, Calvin-Khang Ta, M. Salman Asif, Amit K. Roy-Chowdhury"
  pub: "ICCV 2025"
  type: "Conference"
  paper_link: https://arxiv.org/abs/2508.06757
  project_page: https://yashgarg98.github.io/VOccl3D-dataset/
  code_link:
  bibtex:
  video:
  image: img/papers/voccl3d.png
  abstract: >
    250K+ frames of realistic (not patch-overlay) occlusions with body shape,
    pose, segmentation, and silhouette ground truth — used to fine-tune
    CLIFF/BEDLAM-CLIFF for substantial gains under heavy occlusion.

- paper: "POISE: Pose Guided Human Silhouette Extraction under Occlusions"
  author: "Arindam Dutta, **Rohit Lal**, Dripta S. Raychaudhuri, Calvin-Khang Ta, Amit K. Roy-Chowdhury"
  pub: "WACV 2024"
  type: "Conference"
  paper_link: https://arxiv.org/abs/2311.05077
  project_page: https://openaccess.thecvf.com/content/WACV2024/html/Dutta_POISE_Pose_Guided_Human_Silhouette_Extraction_Under_Occlusions_WACV_2024_paper.html
  code_link: https://github.com/take2rohit/poise
  bibtex:
  video:
  image: img/portfolio/balance.webp
  abstract: >
    A self-supervised fusion framework that combines an initial silhouette mask
    with predicted 2D-pose joints to recover complete human silhouettes when
    the subject is heavily occluded.

