- paper: "Surya: A Foundation Model for Heliophysics"
  author: "Sujit Roy, Johannes Schmude, **Rohit Lal**, Vishal Gaur, Marcus Freitag, Julian Kuehnert, Theodore van Kessel, Dinesha V. Hegde, Andrés Muñoz-Jaramillo, Johannes Jakubik, Etienne Vos, Kshitiz Mandal, et al."
