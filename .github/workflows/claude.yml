name: Claude

# Mention @claude in an issue, an issue comment, or a PR comment and Claude
# will pick up the task, work on a branch, and open a pull request.
on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

# Least-privilege defaults; the job below widens only what it needs.
permissions:
  contents: read

jobs:
  claude:
    # Only run when @claude is actually mentioned (skip for the bot's own posts).
    if: |
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-22.04
    permissions:
      contents: write       # commit fixes and push the branch
      pull-requests: write  # open the PR and comment on it
      issues: write         # comment back on the issue
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
