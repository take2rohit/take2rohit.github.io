- company: NASA IMPACT
  url: https://impact.earthdata.nasa.gov
  title: Computer Scientist II
  date: May 2024 - Present
  location: Huntsville, AL, USA
  description: >
    Lead training of **Surya**, a heliophysics foundation model on 300 TB+ of 4K satellite
    observations using spectral-spatial Transformers with VAE + quantized latents (collaboration
    with IBM, NVIDIA, and Microsoft). Scaled training to 128 GH200s with TP/PP/FSDP and hybrid
    precision (3.2x memory savings); built TransformerEngine-based fused LN+MLP and attention to
    enable FP8/FP4 long-context training (10M+ tokens); fault-tolerant dataloader with local
    caching, epoch resume, and corruption handling, plus restartable training via async sharded
    checkpointing.
    Co-developed **PrithviWxC**, NASA's first 2.3B-parameter climate foundation model, with a
    novel local-global attention mechanism combined with masked-token reconstruction and
    autoregressive rollout. Reduced hurricane path error by 68-76% and landfall error 4x, while
    cutting temperature downscaling RMSE by >75%. Outperformed GraphCast and FourCastNet on
    benchmarks adopted by NOAA/NASA.

